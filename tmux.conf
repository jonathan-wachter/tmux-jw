# ~/.tmux.conf — tuned for running Claude Code over mosh from an iPad (Blink Shell)
# Created 2026-06-03. Each setting is commented so you know WHY it's here.

# ─────────────────────────────────────────────────────────────────────────────
# CORE USABILITY
# ─────────────────────────────────────────────────────────────────────────────
# PREFIX = Ctrl+k (remapped from the default Ctrl+b, 2026-07-02).
# ⚠️ C-k is readline/zsh "kill line" — inside a shell, tap C-k C-k to send a
# literal Ctrl+k through (send-prefix below). C-b goes back to the apps.
set -g prefix C-k
unbind C-b
bind C-k send-prefix

set -g mouse on                 # tap to select panes, scroll with the trackpad/Magic Keyboard
set -g history-limit 50000      # deep scrollback so long Claude Code sessions aren't truncated
set -g base-index 1             # number windows from 1 (easier to reach on a keyboard than 0)
setw -g pane-base-index 1       # same for panes
set -g renumber-windows on      # keep window numbers gapless when you close one
set -g focus-events on          # let apps (like Claude Code) know when the pane gains/loses focus

# ⚠️ PITFALL FIX: the single most important line for Claude Code.
# tmux's default 500ms "escape-time" swallows/delays the Esc key — and Esc is how you
# INTERRUPT Claude Code mid-turn (and Esc-Esc opens the rewind menu). Drop it to 10ms.
set -sg escape-time 10

# ─────────────────────────────────────────────────────────────────────────────
# TERMINAL FEATURES — 24-bit color, extended keys, escape passthrough
# ─────────────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"          # true 24-bit color (Claude Code's UI uses it)
# ⚠️ PITFALL FIX: "always", not "on". With "on", tmux only forwards extended keys
# (like Shift+Enter = \x1b[13;2u) to apps that explicitly request them — and Claude Code
# can't request them from inside tmux because it can't detect the outer terminal
# (github.com/anthropics/claude-code/issues/26629). "always" forwards unconditionally.
set -s extended-keys always
set -s extended-keys-format csi-u            # emit the CSI-u format Claude Code parses (tmux ≥3.5a)
set -as terminal-features 'xterm*:extkeys'   # advertise extended-key support to apps
set -g allow-passthrough on                  # let Claude Code's special escape sequences
                                             # (desktop notifications, image protocols) pass through tmux

# ─────────────────────────────────────────────────────────────────────────────
# CLIPBOARD OVER MOSH (OSC 52)
# Claude Code's /copy and copy-on-select use the OSC 52 escape sequence over
# remote connections. mosh 1.4.0 only accepts the "c;" clipboard-target form,
# but tmux emits a different target by default — so without the override below,
# copying from Claude Code over mosh SILENTLY fails (mosh #637, tmux #3423).
# ─────────────────────────────────────────────────────────────────────────────
set -g set-clipboard on                                   # allow apps to set clipboard via OSC 52
set -as terminal-overrides ',xterm*:Ms=\E]52;c;%p2%s\a'   # force the "c;" form mosh accepts

# MOUSE COPY → MAC CLIPBOARD (pbcopy)
# The tmux SERVER runs locally on this Mac, so shelling out to pbcopy writes the
# real macOS pasteboard directly — deterministic, no OSC 52 / terminal / mosh deps.
# Every default copy binding uses `copy-pipe-and-cancel` with no command, which
# falls back to `copy-command`. So this ONE line routes mouse-drag, double-click
# (word), triple-click (line), Enter, and C-j all to the Mac clipboard.
# (set-clipboard above still fires OSC 52 too → also lands on the viewing device
# when remote on iPad/mosh and the terminal honors it. Belt + suspenders.)
set -g copy-command 'pbcopy'

set -g status-interval 10       # 2026-07-09: fallback lag cap (was 30 post-storm, 5 pre). Readers are cheap cached cats; builds stay 30s-gated.
set -g status-position top      # window "tabs" at the top — reads like browser tabs

# ─────────────────────────────────────────────────────────────────────────────
# CLAUDE CODE SESSION DASHBOARD  (added 2026-06-10)
# Window tabs + pane borders show each Claude Code session's live state:
#   🤖 working · 💬 question for you · 🔴 needs you (permission/error)
#   ✅ done while you were away (auto-clears when you visit) · nothing = idle
# State lives in per-pane user options (@ccstate/@ccname) written by Claude
# Code hooks (instant) and corrected by a reconciler script every 5s (catches
# crashes/Ctrl+C, publishes /rename names, prints the global summary).
# Scripts: ~/.config/tmux-jw/hooks/tmux-claude-{state,reconcile,jump}.sh
# ─────────────────────────────────────────────────────────────────────────────

# State glyph for the window's ACTIVE pane (stored once, used via #{E:...})
# 🟠 stalled = claims busy but pane painted nothing for 3+ min (reconciler watchdog)
set -g @ccglyph '#{?#{==:#{@ccstate},working}, 🤖,#{?#{==:#{@ccstate},question}, 💬,#{?#{==:#{@ccstate},needs_you}, 🔴,#{?#{==:#{@ccstate},done}, ✅,#{?#{==:#{@ccstate},stalled}, 🟠,}}}}}'

# Alert badge: 🔴 when ANY pane in the window needs attention but the active
# pane (whose own glyph is showing) isn't the one that needs it.
set -g @ccbadge '#{?#{||:#{||:#{==:#{@ccstate},needs_you},#{==:#{@ccstate},question}},#{==:#{@ccstate},stalled}},,#{?#{||:#{||:#{m:*needs_you*,#{P:#{@ccstate} }},#{m:*question*,#{P:#{@ccstate} }}},#{m:*stalled*,#{P:#{@ccstate} }}}, 🔴,}}'

# Window tabs: index + Claude session name (falls back to tmux window name).
# Current window = reverse video (color swap) instead of [brackets] — saves
# 2 chars per screen and reads better on the iPhone.
set -g window-status-format ' #I:#{?#{@ccname},#{@ccname},#W}#{E:@ccglyph}#{E:@ccbadge} '
set -g window-status-current-format '#[bold,reverse] #I:#{?#{@ccname},#{@ccname},#W}#{E:@ccglyph}#{E:@ccbadge} #[default]'

# Pane borders: per-pane state when a window is split (auto-shows only with
# >1 pane — verified tmux 3.6b shows the border line even for single panes,
# so a layout hook toggles it; new windows start off via the global default)
set -g pane-border-status off
set -g pane-border-format ' #{?pane_active,#[bold],}#{pane_index}: #{?#{@ccname},#{@ccname},#{pane_title}}#{E:@ccglyph}#[default] '
set-hook -g window-layout-changed 'set-option -wF pane-border-status "#{?#{==:#{window_panes},1},off,top}"'

# ✅ done auto-clears the moment you focus that pane (needs focus-events on).
# 2026-07-09: ALSO kick the dirty hook — clearing the option alone updated tmux's
# internal state but the boxbar kept rendering the cached ✅ (glyph + counts) for
# up to 30s, because nothing marked the cache stale or forced a redraw. The kick
# only fires when a ✅ was actually cleared (inside the if), so it cannot storm.
set-hook -g pane-focus-in "if -F '#{==:#{@ccstate},done}' 'set-option -pq -u @ccstate ; run-shell -b ~/.config/tmux-jw/hooks/tmux-claude-dirty.sh'"

# INSTANT BAR REFRESH on window rename / new / close (2026-07-08, P4). The
# boxbar reader only rebuilds early on an @ccstate transition (the state.dirty
# signal); these events otherwise waited out the 30s INTERVAL. tmux-claude-dirty.sh
# bumps state.dirty + forces one redraw so a rename/new/close shows in ~200ms.
# Indexed [52] so re-sourcing this conf overwrites (never stacks) these entries;
# -b so the hook never blocks the triggering command. STORM-SAFE (one truncate +
# one refresh of CACHED rows — see the hook header).
set-hook -g window-renamed[52]  'run-shell -b "~/.config/tmux-jw/hooks/tmux-claude-dirty.sh"'
set-hook -g window-linked[52]   'run-shell -b "~/.config/tmux-jw/hooks/tmux-claude-dirty.sh"'
set-hook -g window-unlinked[52] 'run-shell -b "~/.config/tmux-jw/hooks/tmux-claude-dirty.sh"'

# ─────────────────────────────────────────────────────────────────────────────
# BAR COLORS  (redesigned 2026-06-19)
# Dark slate text + box lines on light gray. The whole bar inherits this; the
# CURRENT window box inverts it (light text on slate) in tmux-claude-bar.sh.
# ─────────────────────────────────────────────────────────────────────────────
set -g status-style 'bg=#d3d3d3,fg=#2f4f4f'   # dark slate (#2f4f4f) on light gray (#d3d3d3)
set -g status-justify left
set -g status-left ''                          # no left chrome (◀◀ scroll arrow dropped)
set -g status-left-length 0

# Status-right: global attention summary (all sessions), now WITHOUT the old
# ▶▶/▶↻ scroll arrows. tmux-claude-bar.sh renders it via #{T:status-right} INSIDE
# the window list (trailing the boxes on the middle row), so it scrolls with them.
# STORM-FIX 2026-06-26: status-right now runs the THROTTLED heartbeat (not the old
# statusline.sh + continuum prepend, which fired continuum_save → tmux-resurrect
# save.sh on EVERY redraw and stacked under load = the spawn storm). The heartbeat
# returns instantly (stat + exit) and gates its heavy work (reconciler + continuum
# autosave) to ≤once/INTERVAL server-wide. tmux-continuum still PREPENDS its own
# #(continuum_save.sh) here at tpm init — that sibling is STRIPPED by a post-tpm
# re-assert at the very bottom of this file (continuum_save then runs only via the
# heartbeat). See docs/notes/2026-06-spawn-storm-*.md.
# 2026-07-09: 30 → 10. This is only the FALLBACK cadence now — @ccstate pushes,
# renames, scroll taps etc. all force targeted redraws — and a redraw costs just
# 3 cat-readers + a stat-and-exit heartbeat per client (the heavy builder stays
# gated at its own 30s INTERVAL + dirty markers). 10s caps any missed-push lag.
set -g status-interval 10
set -g status-right-length 60
set -g status-right ' #(~/.config/tmux-jw/hooks/tmux-claude-heartbeat.sh) '

# ─────────────────────────────────────────────────────────────────────────────
# BAR LAYOUT — 3-line line-drawing boxes ⇆ 1-line compact  (redesigned 2026-06-19)
# The window list is drawn as boxes across 3 status lines (top border / label /
# bottom border). The CURRENT window box is highlighted with an inverted fill +
# double-line border. The list AUTO-SCROLLS to keep the current box visible
# (tmux's list=focus), and the clip markers are EMPTY so NO ◀/▶ arrow chrome ever
# appears (the old ◀◀/▶▶/↺◀/▶↻ corner tap-targets were removed 2026-06-19).
#
# tmux-claude-bar.sh holds the (large) status-format strings — see its header for
# why they live in a script (the list=/range= directives must sit at the top
# level of status-format, which #{E:@opt} indirection can't guarantee). It runs
# ONCE here to install the 3-line layout, and ONCE per toggle — never per redraw,
# so unlike the old inline reconciler it cannot cause the mosh cursor flicker.
#   prefix + b  →  toggle 3-line ⇆ 1-line (same color scheme; unbound by default)
# ─────────────────────────────────────────────────────────────────────────────
run-shell '~/.config/tmux-jw/hooks/tmux-claude-bar.sh 3'
bind b run-shell '~/.config/tmux-jw/hooks/tmux-claude-bar.sh toggle'

# ─────────────────────────────────────────────────────────────────────────────
# MOVE THE CURRENT WINDOW LEFT / RIGHT IN THE TAB LIST  (added 2026-06-17)
# next/previous-window (above) just move FOCUS; swap-window reorders the window's
# POSITION. prefix + < / > swaps the current window one slot left / right. The
# trailing previous/next-window keeps focus ON the window you're moving, so it
# travels with you instead of you landing on whatever swapped into its old slot.
#   -r = repeatable: after the prefix, tap < or > repeatedly (within repeat-time)
#        to keep nudging the window without re-pressing the prefix.
#   < / > are the shifted , / . keys — the same "move left / move right" mnemonic
#        as the ◀◀ / ▶▶ tab arrows above, and unbound by default so no conflict.
# Edge: at the first/last window there's no neighbor to swap with, so the tap is
# a harmless no-op (renumber-windows on + base-index 1 keep indexes gap-free).
# ─────────────────────────────────────────────────────────────────────────────
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# ─────────────────────────────────────────────────────────────────────────────
# prefix + . : TELEPORT the current window to an ABSOLUTE slot number — it lands
#   AT the number you type, that slot + everything rightward shifts over one,
#   the vacated slot closes up, session ends gap-free. One prompt, ANY distance
#   (vs. tapping > repeatedly). Delegates to hooks/tmux-window-teleport.sh; see
#   its header for the three bugs it fixes (move-window never fires
#   renumber-windows -> gaps; gaps make index diverge from bar position ->
#   the compounding off-by-one; insert direction must flip for up vs down).
#   %% = typed target; #{window_id}/#{session_name} (expanded by run-shell)
#   pin down exactly which window to move — no client-context guessing.
#   base-index 1, so type 1 for the front; out-of-range clamps to front/end.
# ─────────────────────────────────────────────────────────────────────────────
bind . command-prompt -T target -p "teleport to slot: " "run-shell \"~/.config/tmux-jw/hooks/tmux-window-teleport.sh '%%' '#{window_id}' '#{session_name}'\""

# ─────────────────────────────────────────────────────────────────────────────
# RIBBON MOUSE ROUTING (MouseDown1Status)
# The ribbon (tmux-claude-bar-render.sh) emits these #[range=…] click targets:
#   • user|bscrollL / bscrollR  → the << / >> buttons: scroll the view one window
#       WITHOUT changing the active window (scroll helper nudges per-client viewport).
#   • user|link_<state>         → a status-box glyph (🤖/💬/🔴/🟠/✅): go to a window
#       of that state anywhere in tmux; if it's not in this session, link it in
#       (link helper). Counts are GLOBAL (all sessions).
#   • window|<idx>              → a window tab → tmux's default select-window -t=.
#   • user|j_* (legacy reconciler summary) → jump.sh, kept for safety.
# run-shell format-expands #{mouse_status_range}/#{client_pid}/#{session_name}.
# DON'T drop the final select-window -t= else-branch or clicking a tab stops working.
#   • user|sessmenu             → the session name (top-left) → open the popup.
bind -n MouseDown1Status {
  if -F '#{m:bscroll*,#{mouse_status_range}}' {
    run-shell '~/.config/tmux-jw/hooks/tmux-claude-bar-scroll.sh #{client_pid} #{session_name} #{mouse_status_range}'
  } {
    if -F '#{m:sessmenu,#{mouse_status_range}}' {
      run-shell '~/.config/tmux-jw/hooks/tmux-claude-dashboard-open.sh'
    } {
      if -F '#{m:link_*,#{mouse_status_range}}' {
        run-shell '~/.config/tmux-jw/hooks/tmux-claude-bar-link.sh #{session_name} #{mouse_status_range}'
      } {
        if -F '#{m:j_*,#{mouse_status_range}}' {
          run-shell '~/.config/tmux-jw/hooks/tmux-claude-jump.sh #{mouse_status_range}'
        } {
          select-window -t=
        }
      }
    }
  }
}

# prefix+g = jump to the Claude that needs you most (🔴 > 💬 > 🟠 > ✅)
bind g run-shell '~/.config/tmux-jw/hooks/tmux-claude-jump.sh'

# prefix+o = COCKPIT popup (v2, 2026-07-02; moved w→o same day): every tmux
# session as a `❯ name ❮` tab across the top — ←/→ (or h/l, or tap a tab)
# browses another session's windows WITHOUT switching to it — with the viewed
# session's windows listed below: index, name, status glyph, and its "※ recap"
# text. Enter/number/tap OPENS a window, switching this client's session too if
# it lives elsewhere. s cycles sort (index → attn → name, sticky). (Recaps
# harvested by the reconciler from Claude Code's own transcript — no extra AI
# calls.) Also opens by tapping the bar's left block (sessmenu range, above).
# Renders as a DROPDOWN hanging off the bar (-y S) on wide clients; borderless
# full-screen on narrow ones (iPhone). Touch: tap to jump, swipe to scroll.
# Headless-testable (JW_DASH_TEST / JW_TMUX) — see tests/run-tests.sh.
# NOTE: this shadows stock o (rotate to next pane — use arrows/mouse instead)
# and stock m (select-pane -m, mark a pane); w returns to stock choose-tree
# below (explicit bind because re-sourcing a conf never REMOVES an old binding
# from a live server).
bind o run-shell '~/.config/tmux-jw/hooks/tmux-claude-dashboard-open.sh'
bind m run-shell '~/.config/tmux-jw/hooks/tmux-claude-dashboard-open.sh'
bind w choose-tree -Zw

# ─────────────────────────────────────────────────────────────────────────────
# CLAUDE SESSION CRASH RECOVERY  (added 2026-06-19)
# tmux-continuum (below) restores tmux WINDOWS after a reboot, but the Claude
# processes inside them are gone. This fills that gap: a snapshotter rides the
# reconciler heartbeat and records the live Claude layout (session ids + cwds +
# pane layouts) to ~/.cache/tmux-claude/last-layout.json; restore relaunches
# `claude --resume <id>` for every session that isn't running.
#   on tmux start →  AUTO-restore downed Claude sessions (once per server)  ★ NEW
#   prefix + R    →  restore all downed Claude sessions by hand (the 1-key) [Shift+r]
#   on attach     →  banner if any are down (detect + notify)
#   cc-restore    →  shell-command fallback if you miss the key/banner
# Restore REUSES continuum's restored shells IN PLACE (relaunches claude via
# send-keys), only creating a window when none is reusable; it never kills and
# skips any session already live — always safe to run again.
# ─────────────────────────────────────────────────────────────────────────────
bind R run-shell '~/.config/tmux-jw/hooks/tmux-claude-restore.sh --target "#{session_name}"'
# Indexed hook ([50]) so re-sourcing this config overwrites THIS entry only —
# it never stacks duplicate banners, and never clobbers another client-attached.
set-hook -g client-attached[50] 'run-shell "~/.config/tmux-jw/hooks/tmux-claude-check.sh --notify"'
# AUTO-RESTORE (added 2026-06-22): on the FIRST client-attach of a fresh server
# (reboot / crash / Moshi reconnect), relaunch any downed Claude sessions in place
# instead of leaving you empty shells. Indexed [51] so it sits beside the [50]
# notify hook; -b so the script's up-to-14s "wait for continuum to settle" never
# blocks your attach. The script self-guards to run ONCE per server PID.
set -g @claude-autorestore 'on'   # 'off' → notify-only (just the prefix+R banner)
set-hook -g client-attached[51] 'run-shell -b "~/.config/tmux-jw/hooks/tmux-claude-autorestore.sh"'
# BOOT-TIME TRIGGER (added 2026-07-02): tmux 3.6 does NOT fire client-attached
# for the client that CREATES the server+session (only on attach-to-existing),
# so after the 3.5a→3.6b patched-tmux switch the [51] hook never ran on reboot
# and sessions stayed down. Firing from config load covers server start
# directly; the hook above still covers late attaches, and the script's
# once-per-server lock makes double-firing (and prefix+r re-sourcing) a no-op.
run-shell -b "~/.config/tmux-jw/hooks/tmux-claude-autorestore.sh"

# ─────────────────────────────────────────────────────────────────────────────
# SESSION-PIPELINES LIVE TICKER  (added 2026-07-15)
# Keeps a detached 'wraps' session running `wraps trace -f` — the lifecycle
# journal of the wrap pipeline (hook fired → enqueued → run → notified) — so
# it's always in the prefix+o cockpit or one `tmux attach -t wraps` away.
# Same boot-time + client-attached[52] pairing as autorestore above (tmux 3.6
# doesn't fire client-attached for the server-creating client); the script is
# idempotent and resurrects a dead ticker on the next attach.
# ─────────────────────────────────────────────────────────────────────────────
set-hook -g client-attached[52] 'run-shell -b "~/.config/tmux-jw/hooks/tmux-wraps-ticker.sh"'
run-shell -b "~/.config/tmux-jw/hooks/tmux-wraps-ticker.sh"

# ─────────────────────────────────────────────────────────────────────────────
# CRASH FORENSICS — ALWAYS-ON PANE LOGGING  (added 2026-06-21)
# On 2026-06-19 a Claude worker died ("[server exited unexpectedly]") leaving the
# terminal flooded with mouse-tracking escapes and NOTHING on disk to explain it
# (no macOS crash report, no debug log — logging was off). This captures the raw
# terminal of every pane you touch, so the NEXT crash is on record. It's the
# terminal-side half; the zsh `claude` wrapper's --debug-file is the app-side half.
#   • Indexed [10] so it STACKS with the pane-focus-in at index 0 (the ✅-clear
#     hook above) instead of overwriting it — same trick as client-attached[50].
#   • The helper is idempotent (skips panes already piped) and prunes logs >7d.
#   • Logs: ~/.claude/tmux-logs/  → grep -l 'server exited unexpectedly' *.log
# ─────────────────────────────────────────────────────────────────────────────
set-hook -g pane-focus-in[10] 'run-shell "~/.config/tmux-jw/hooks/tmux-pane-log.sh #{pane_id} #{session_name} #{window_index} #{pane_index} #{pane_pipe}"'

# ─────────────────────────────────────────────────────────────────────────────
# REBOOT / DISCONNECT SURVIVAL  (via TPM = Tmux Plugin Manager)
#   resurrect  = save/restore sessions manually (prefix + Ctrl-s / prefix + Ctrl-r)
#   continuum  = do it automatically every few minutes + auto-restore after a Mac reboot
# So even if the Mac restarts, your Claude Code session layout comes back.
# ─────────────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'        # auto-restore the last saved session on tmux start
set -g @continuum-save-interval '5'   # autosave every 5 minutes

# Keep tpm AFTER all @plugin declarations above. (The storm-fix re-assert below is
# the ONE intentional exception that must run after tpm — see its comment.)
run '~/.tmux/plugins/tpm/tpm'

# ── STORM-FIX 2026-06-26: tmux-continuum's add_resurrect_save_interpolation()
# PREPENDS #(continuum_save.sh) onto status-right during the tpm init above. That
# puts continuum_save back on the per-redraw path — it fires on every forced
# refresh-client -S (= every Claude hook), bypassing the heartbeat's throttle, and
# is the single biggest storm contributor. tpm sources plugins synchronously, so
# this re-assert (which runs AFTER the run above) wins and strips the prepend.
# continuum autosave still works: the throttled heartbeat calls continuum_save.sh
# directly. NOTE: prefix+I / re-init tpm WITHOUT a full conf reload re-adds the
# prepend — re-run `source-file ~/.tmux.conf` to re-strip it.
set -g status-right ' #(~/.config/tmux-jw/hooks/tmux-claude-heartbeat.sh) '

# ─────────────────────────────────────────────────────────────────────────────
# LOCAL OVERRIDES (last on purpose — wins over everything above, including the
# storm-fix re-assert). Optional, git-ignored; copy tmux-jw.local.tmux.example
# → tmux-jw.local.tmux to change the prefix or any option without forking this
# file. -q = silently skip when the file doesn't exist.
# ─────────────────────────────────────────────────────────────────────────────
source-file -q ~/.config/tmux-jw/tmux-jw.local.tmux
